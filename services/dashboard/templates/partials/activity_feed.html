<!-- Single activity feed event card. Rendered by SSE JS handler in index.html -->
<!-- This partial is for reference; SSE events are rendered via JS in index.html -->
<div class="feed-item bg-ok-bg rounded px-3 py-2 text-xs font-mono border border-ok-border">
    <div class="flex items-center justify-between gap-2 mb-1">
        <span class="text-ok-blue">{{ event.source }}</span>
        <span class="text-gray-500">{{ event.created_at }}</span>
    </div>
    <div class="text-gray-300">{{ event.event_type }}</div>
    {% if event.actor %}
    <div class="text-gray-500">actor: {{ event.actor }}</div>
    {% endif %}
</div>
