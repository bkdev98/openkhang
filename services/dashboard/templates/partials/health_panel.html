<!-- Compact health for sidebar footer -->
<span class="text-ok-ghost text-[10px] font-medium uppercase tracking-wider">System</span>
<div class="flex flex-col gap-1.5">
    {% for svc in services %}
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="status-dot {{ 'ok' if svc.status == 'ok' else 'error' }}"></span>
            <span class="font-mono text-[11px] text-ok-muted">{{ svc.name }}</span>
        </div>
        <span class="font-mono text-[11px] {{ 'text-ok-green' if svc.status == 'ok' else 'text-ok-red' }}">
            {{ 'OK' if svc.status == 'ok' else 'ERR' }}
        </span>
    </div>
    {% endfor %}
    {% if not services %}
    <span class="text-[11px] text-ok-ghost">No services detected</span>
    {% endif %}
</div>
