<div id="stats-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4">
    <!-- Pending Drafts -->
    <div class="bg-ok-srf border border-ok-border rounded-lg p-4 card-hover">
        <p class="stat-number font-mono text-2xl font-semibold text-ok-text">{{ stats.get('pending_drafts', 0) }}</p>
        <p class="text-[11px] text-ok-muted mt-1">pending drafts</p>
    </div>
    <!-- Events Today -->
    <div class="bg-ok-srf border border-ok-border rounded-lg p-4 card-hover">
        <p class="stat-number font-mono text-2xl font-semibold text-ok-amber">{{ stats.get('events_today', 0) }}</p>
        <p class="text-[11px] text-ok-muted mt-1">events today</p>
    </div>
    <!-- Approved Today -->
    <div class="bg-ok-srf border border-ok-border rounded-lg p-4 card-hover">
        <p class="stat-number font-mono text-2xl font-semibold text-ok-green">{{ stats.get('approved_today', 0) }}</p>
        <p class="text-[11px] text-ok-muted mt-1">approved today</p>
    </div>
    <!-- Total Events -->
    <div class="bg-ok-srf border border-ok-border rounded-lg p-4 card-hover">
        <p class="stat-number font-mono text-2xl font-semibold text-ok-muted">{{ stats.get('total_events', 0) }}</p>
        <p class="text-[11px] text-ok-muted mt-1">total events</p>
    </div>
</div>
