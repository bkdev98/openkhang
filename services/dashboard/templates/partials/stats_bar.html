<div
    id="stats-bar"
    class="bg-ok-card border border-ok-border rounded-lg p-4 grid grid-cols-2 gap-3">
    <div class="col-span-2 flex items-center justify-between mb-2 pb-2 border-b border-ok-border">
        <span class="text-xs text-gray-400">Auto-reply mode</span>
        <button
            hx-post="/api/autoreply/toggle"
            hx-target="#autoreply-badge"
            hx-swap="innerHTML"
            class="cursor-pointer hover:opacity-80 transition-opacity"
            id="autoreply-badge">
            <span class="px-2 py-1 rounded text-xs font-bold bg-green-600 text-white">Auto-reply: ON</span>
        </button>
    </div>
    <div class="flex flex-col">
        <span class="text-2xl font-mono font-bold text-ok-blue">{{ stats.get('pending_drafts', 0) }}</span>
        <span class="text-xs text-gray-500 mt-1">pending drafts</span>
    </div>
    <div class="flex flex-col">
        <span class="text-2xl font-mono font-bold text-ok-blue">{{ stats.get('events_today', 0) }}</span>
        <span class="text-xs text-gray-500 mt-1">events today</span>
    </div>
    <div class="flex flex-col">
        <span class="text-2xl font-mono font-bold text-green-400">{{ stats.get('approved_today', 0) }}</span>
        <span class="text-xs text-gray-500 mt-1">approved today</span>
    </div>
    <div class="flex flex-col">
        <span class="text-2xl font-mono font-bold text-gray-400">{{ stats.get('total_events', 0) }}</span>
        <span class="text-xs text-gray-500 mt-1">total events</span>
    </div>
</div>
