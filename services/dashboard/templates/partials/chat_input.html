{% if result %}
<div class="bg-ok-raised border border-ok-border rounded-lg p-3 flex flex-col gap-2">
    <div class="text-xs text-ok-ghost italic border-l-2 border-ok-ghost pl-2">
        {{ question }}
    </div>
    {% if result.error %}
    <p class="text-ok-red text-sm">{{ result.error }}</p>
    {% else %}
    <div class="text-sm text-ok-text leading-relaxed whitespace-pre-wrap">
        {{ result.reply_text }}
    </div>
    <div class="flex items-center gap-3 text-[10px] text-ok-ghost font-mono border-t border-ok-border pt-2 mt-1">
        <span>conf: {{ (result.confidence * 100)|int }}%</span>
        <span>latency: {{ result.latency_ms }}ms</span>
    </div>
    {% endif %}
</div>
{% endif %}
