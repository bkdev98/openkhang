{% if not drafts %}
<div class="text-center py-8">
    <p class="text-gray-600 text-sm">No pending drafts</p>
    <p class="text-gray-700 text-xs mt-1">New drafts appear when confidence is below threshold</p>
</div>
{% else %}
<div class="flex flex-col gap-3 max-h-72 overflow-y-auto pr-1">
    {% for draft in drafts %}
    {% include "partials/draft_card.html" %}
    {% endfor %}
</div>
<p class="text-xs text-gray-600 text-right mt-2">{{ drafts|length }} pending</p>
{% endif %}
