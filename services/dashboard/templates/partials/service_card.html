<!-- Single service health card. Used within health_panel.html -->
<div class="flex items-center justify-between bg-ok-bg rounded px-3 py-2 border border-ok-border">
    <div class="flex items-center gap-2">
        <span class="status-dot {{ 'ok' if service.status == 'ok' else 'error' }}"></span>
        <span class="text-sm font-mono text-gray-200">{{ service.name }}</span>
        <span class="text-xs text-gray-600">{{ service.type }}</span>
    </div>
    <span class="text-xs text-gray-500 truncate max-w-32" title="{{ service.detail }}">
        {{ service.detail[:40] }}{% if service.detail|length > 40 %}...{% endif %}
    </span>
</div>
