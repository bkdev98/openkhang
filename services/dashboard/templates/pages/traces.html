<div class="page-enter flex flex-col gap-4">

    <!-- Page header -->
    <div class="flex items-center justify-between">
        <h1 class="font-mono font-semibold text-lg text-ok-text">Request Traces</h1>
        <span class="text-xs text-ok-ghost">Full pipeline observability</span>
    </div>

    <!-- Filter bar -->
    <div class="flex items-center gap-2 flex-wrap">
        <button class="filter-pill active" data-mode="all" onclick="filterTraces('')">All</button>
        <button class="filter-pill" data-mode="outward" onclick="filterTraces('outward')">
            <i data-lucide="arrow-up-right" class="w-3 h-3"></i> Outward
        </button>
        <button class="filter-pill" data-mode="inward" onclick="filterTraces('inward')">
            <i data-lucide="arrow-down-left" class="w-3 h-3"></i> Inward
        </button>
        <span class="text-ok-ghost text-xs mx-1">|</span>
        <button class="filter-pill" data-action="drafted" onclick="filterTraceAction('drafted')">Drafted</button>
        <button class="filter-pill" data-action="auto_sent" onclick="filterTraceAction('auto_sent')">Auto-sent</button>
        <button class="filter-pill" data-action="inward_response" onclick="filterTraceAction('inward_response')">Response</button>
        <button class="filter-pill" data-action="error" onclick="filterTraceAction('error')">Errors</button>
        <button class="text-[10px] text-ok-ghost hover:text-ok-text ml-auto"
                hx-get="/api/traces" hx-target="#trace-list" hx-swap="innerHTML"
                onclick="document.getElementById('trace-detail').innerHTML=''; resetFilters()">
            <i data-lucide="refresh-cw" class="w-3 h-3 inline"></i> Refresh
        </button>
    </div>

    <!-- Two-panel layout: list + detail -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <!-- Trace list -->
        <div id="trace-list"
             class="flex flex-col gap-2 max-h-[calc(100vh-200px)] overflow-y-auto"
             hx-get="/api/traces"
             hx-trigger="load"
             hx-swap="innerHTML">
            <p class="text-ok-ghost text-xs text-center py-8">Loading traces...</p>
        </div>

        <!-- Trace detail (populated on click) -->
        <div id="trace-detail"
             class="max-h-[calc(100vh-200px)] overflow-y-auto">
            <div class="text-center py-12">
                <i data-lucide="scan-search" class="w-8 h-8 text-ok-ghost mx-auto mb-2"></i>
                <p class="text-ok-ghost text-sm">Select a trace to view details</p>
                <p class="text-ok-ghost text-xs mt-1">Click any request to see the full pipeline flow</p>
            </div>
        </div>
    </div>
</div>

<script>
var _traceMode = '';
var _traceAction = '';

function filterTraces(mode) {
    _traceMode = mode;
    _traceAction = '';
    _updateTraceFilters();
    _loadTraces();
}

function filterTraceAction(action) {
    _traceAction = (_traceAction === action) ? '' : action;
    _updateTraceFilters();
    _loadTraces();
}

function resetFilters() {
    _traceMode = '';
    _traceAction = '';
    _updateTraceFilters();
}

function _updateTraceFilters() {
    document.querySelectorAll('[data-mode]').forEach(function(p) {
        var isAll = p.dataset.mode === 'all' && !_traceMode;
        p.classList.toggle('active', isAll || p.dataset.mode === _traceMode);
    });
    document.querySelectorAll('[data-action]').forEach(function(p) {
        p.classList.toggle('active', p.dataset.action === _traceAction);
    });
}

function _loadTraces() {
    var params = new URLSearchParams();
    if (_traceMode) params.set('mode', _traceMode);
    if (_traceAction) params.set('action', _traceAction);
    var url = '/api/traces' + (params.toString() ? '?' + params.toString() : '');
    htmx.ajax('GET', url, '#trace-list');
    document.getElementById('trace-detail').innerHTML = '';
}

// Re-init Lucide after HTMX swaps in trace content
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'trace-list' || evt.detail.target.id === 'trace-detail') {
        setTimeout(function() { lucide.createIcons(); }, 50);
    }
});
</script>
